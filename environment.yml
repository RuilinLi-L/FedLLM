name: fedllm-dager
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pytorch=2.3.0
  - torchvision=0.18.0
  - torchaudio=2.3.0
  - pytorch-cuda=11.8
  - numpy=1.26
  - pandas=2.2
  - scipy=1.13
  - scikit-learn=1.5
  - tqdm=4.66
  - pyyaml=6.0
  - requests=2.31
  - pip:
      # DAGER depends on GPT-2 internals; keep Transformers pinned well
      # below 4.57, whose GPT-2 block output shape breaks old partial
      # forward assumptions.
      - transformers==4.45.1
      - tokenizers==0.20.0
      - datasets==2.19.0
      - accelerate==0.34.2
      - peft==0.13.0
      - huggingface-hub==0.25.1
      - safetensors==0.4.5
      - opacus==1.5.4
      - rouge-score==0.1.2
      - sentencepiece==0.2.0
      - einops==0.8.0
      - neptune-client==0.16.15
